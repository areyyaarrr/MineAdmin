<!DOCTYPE html>
<html>
<head>
    <title>Players</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #eee; }

</head>
<body>
    <h1>Player Management</h1>
    <table>
        <tr>

        <!-- Example row -->
        <tr>
            <td>Steve</td>
            <td>10:05 PM</td>
            <td>10:45 PM</td>
            <td>40 minutes</td>
        </tr>

</html>
